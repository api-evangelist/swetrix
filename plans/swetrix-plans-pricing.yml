  - Privacy
  - Real-Time Analytics
  - Web Analytics
description: Swetrix uses a single-product tiered subscription model where each tier is differentiated
  by the included monthly events quota. All tiers ship the same feature set (web analytics, sessions,
  speed monitoring, error tracking, funnels, feature flags, A/B experiments, CAPTCHA alternative, API
  access, team invites, up to 50 websites). Annual billing offers approximately a 17% discount. A 14-day
  trial is available.
sources:
  - https://swetrix.com/#pricing
plans:
