        name: base_subscription
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '$19/month or $228/year'
        userMultiplied: false
      - label: Monthly Events
        name: monthly_events
        type: quota
        metric: event
        limit: 100000
        timeFrame: month
        geo: global
        unit: 1
        price: '0'
