description: FOCUS-aligned FinOps definition for Swetrix. Pricing is a pure tiered subscription differentiated
  by the included monthly event quota (10 published tiers from 100k to 20M events plus a Custom tier).
  All tiers ship the same feature set, so the only variable cost driver is monthly event volume.
sources:
  - https://swetrix.com/#pricing
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Monthly or Annual
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Swetrix
  ServiceCategory: Web Analytics
  ProviderName: Swetrix
  PublisherName: Swetrix Ltd.
  InvoiceIssuerName: Swetrix Ltd.
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: base_subscription
    description: Monthly or annual base plan fee, tier determined by included monthly event quota
    unit: month
    aggregation: sum
    dimensions:
      - plan
  - name: monthly_events
    description: Tracked analytics events ingested per month (counted against plan quota)
    unit: event
    aggregation: sum
    dimensions:
      - project
      - event_type
  - name: tracked_websites
    description: Websites under one account, capped at 50 per account
    unit: website
    aggregation: max
    dimensions:
      - project
principles:
  - name: Visibility
    description: Use the Swetrix dashboard project usage view to track monthly event volume relative
      to the subscribed plan quota; alert as you approach the next tier threshold.
  - name: Allocation
    description: Allocate Swetrix cost to the product or marketing site whose tracked events drive volume;
      one Swetrix account aggregates up to 50 sites which can be split per business unit.
  - name: Optimization
    description: Reduce event volume by sampling high-volume events, disabling tracking on noisy paths,
      and choosing annual billing for the ~17% discount; right-size to the smallest tier that covers
      typical monthly volume rather than the peak.
  - name: Accountability
    description: Assign a Swetrix account owner per workspace; review monthly event consumption against
      the subscribed tier and forecast tier upgrades 1-2 months ahead.
