          in: path
          type: string
          required: true
        - name: viewId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteview
        method: DELETE
        description: Delete Project View
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: pid
          in: path
          type: string
          required: true
        - name: viewId
          in: path
          type: string
          required: true
    authentication:
