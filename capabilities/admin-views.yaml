    - name: v1-project-pid-views
      path: /v1/project/{pid}/views
      operations:
      - name: listviews
        method: GET
        description: List Project Views
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: pid
          in: path
          type: string
          description: Project ID
          required: true
      - name: createview
        method: POST
        description: Create Project View
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: pid
          in: path
          type: string
          description: Project ID
