      name: v1-project-pid-views
      description: REST surface for v1-project-pid-views.
      operations:
      - method: GET
        name: listviews
        description: List Project Views
        call: admin-views.listviews
        with:
          pid: rest.pid
        outputParameters:
        - type: object
          mapping: $.
