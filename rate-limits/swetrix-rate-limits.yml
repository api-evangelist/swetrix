specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Swetrix
providerId: swetrix
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Analytics
  - Web Analytics
  - Rate Limiting
description: Swetrix's pricing page does not publish per-second rate limits for the API. The primary
  consumption ceiling is the monthly event quota tied to the subscribed plan. This artifact captures
  the quota-based throttling envelope; per-second numbers should be sourced from the live API documentation
  if/when published.
sources:
  - https://swetrix.com/#pricing
  - https://swetrix.com/docs/api/
responseCodes:
  throttled: 429
limits:
  - name: Monthly Event Quota (Plan-Bound)
    scope: account
    metric: events_per_month
    limit: see plans/swetrix-plans-pricing.yml for the subscribed tier (100k Starter through 20M Mega)
    notes: Swetrix's primary throttle is the monthly event volume tied to the subscribed plan; events
      beyond the included quota require upgrading to a higher tier or to the Custom plan.
policies:
  - name: Quota-Based Throttling
    description: Swetrix differentiates plans by monthly event quota rather than per-second request
      limits. Customers approaching the quota should upgrade or contact sales for the Custom tier.
  - name: Backoff Strategy
    description: Clients receiving HTTP 429 should pause and retry with exponential backoff and jitter.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
